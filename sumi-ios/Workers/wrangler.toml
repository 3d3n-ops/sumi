name = "sumi-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Public, non-secret config. Secrets (OPENROUTER_API_KEY, SUMI_APP_SECRET,
# APNS_AUTH_KEY, APNS_KEY_ID, APNS_TEAM_ID) are set with `wrangler secret put`.
[vars]
# Pick any model slug from openrouter.ai/models (verify it's current).
OPENROUTER_MODEL = "anthropic/claude-sonnet-4.6"
APNS_TOPIC = "Eden-Etuk.sumi-ios"
APNS_HOST = "api.push.apple.com"   # TestFlight/App Store use prod APNs

# Stores registered APNs device tokens. Create with:
#   wrangler kv namespace create DEVICE_TOKENS
# then paste the printed id below.
[[kv_namespaces]]
binding = "DEVICE_TOKENS"
id = "a642ac328a79422681d2d8be8e685cd8"

# Silent-push schedule. Cloudflare cron is UTC and does NOT observe DST.
# Target: 6:45am and 3:00pm US Central.
#   - CDT (Mar–Nov, UTC-5, IN EFFECT NOW):  11:45 and 20:00 UTC  ← set below
#   - CST (Nov–Mar, UTC-6):                 12:45 and 21:00 UTC
# Flip to the CST values (45 12 / 0 21) at the November DST change, or accept a
# 1-hour drift.
[triggers]
crons = ["45 11 * * *", "0 20 * * *"]
