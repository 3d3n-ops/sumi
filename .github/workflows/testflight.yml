name: TestFlight

# Manual trigger only — run from the Actions tab.
# Signs with an explicit Apple Distribution cert + App Store profile (stored as
# secrets), then uploads with an App Store Connect API key. We do NOT use
# -allowProvisioningUpdates: xcodebuild's on-the-fly provisioning over an API
# key fails auth against developerservices2 for this account.
on:
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: false

jobs:
  upload:
    runs-on: macos-15-xlarge
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode 26
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          [ -n "$XCODE" ] || { echo "No Xcode 26 on runner"; ls -d /Applications/Xcode*.app; exit 1; }
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Import signing assets
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          KC="$RUNNER_TEMP/signing.keychain-db"
          KC_PWD="$(openssl rand -base64 24)"
          echo "KEYCHAIN_PATH=$KC" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PWD=$KC_PWD" >> "$GITHUB_ENV"

          # Distribution certificate -> dedicated keychain
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KC_PWD" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KC_PWD" "$KC"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KC"
          security set-key-partition-list -S apple-tool:,apple: -k "$KC_PWD" "$KC" >/dev/null
          # Add to search list (keep existing keychains too)
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | sed s/\"//g)
          security find-identity -v -p codesigning "$KC"

          # App Store provisioning profile -> where Xcode looks for it
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILES_DIR/sumi_appstore.mobileprovision"

          # App Store Connect API key (used only for the upload step)
          mkdir -p "$RUNNER_TEMP/keys"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/keys/AuthKey.p8"

      - name: Archive (Release, manual signing)
        run: |
          set -euo pipefail
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          xcodebuild archive \
            -scheme sumi-ios \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Sumi.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=U97LL9V6WP \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="Sumi App Store CI" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export and upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -euo pipefail
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Sumi.xcarchive" \
            -exportOptionsPlist .github/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath "$RUNNER_TEMP/keys/AuthKey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Clean up secrets
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/keys/AuthKey.p8" "$RUNNER_TEMP/cert.p12"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/sumi_appstore.mobileprovision"
