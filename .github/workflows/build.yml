name: Build Sumi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15-xlarge

    steps:
      - uses: actions/checkout@v4

      # Pick the newest Xcode 26.x present on the runner rather than a hardcoded
      # point release, so the workflow survives image updates (26.0 -> 26.1 ...).
      - name: Select latest Xcode 26
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          if [ -z "$XCODE" ]; then
            echo "No Xcode 26 on this runner. Installed:"; ls -d /Applications/Xcode*.app
            exit 1
          fi
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      # Surfaced in logs so a destination mismatch is easy to diagnose.
      - name: List simulators
        run: |
          xcrun simctl list runtimes
          xcrun simctl list devices available | grep -i iphone || true

      # `xcodebuild test` compiles the app + test targets, so this covers the
      # build too. OS=latest binds to the newest iOS runtime on the image
      # (must be >= the 26.0 deployment target). Simulator builds need no signing.
      - name: Build & test
        run: |
          xcodebuild test \
            -scheme sumi-ios \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -configuration Debug \
            -skip-testing:sumi-iosUITests \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
